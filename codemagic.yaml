workflows:
  android-apk-build:
    name: Build Android APK
    instance_type: linux
    max_build_duration: 60
    environment:
      node: 20
      groups:
        - expo_credentials # User must add EXPO_TOKEN here in Codemagic UI
      vars:
        ANDROID_SDK_ROOT: /opt/android-sdk-linux
    scripts:
      - name: Install EAS CLI
        script: npm install -g eas-cli
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build Android APK (Local)
        script: |
          cd frontend
          # Using EXPO_TOKEN from environment variables
          EXPO_TOKEN=$EXPO_TOKEN eas build -p android --profile preview --local --non-interactive
    artifacts:
      - frontend/*.apk
    publishing:
      email:
        recipients:
          - chiranjeeb1101@gmail.com
