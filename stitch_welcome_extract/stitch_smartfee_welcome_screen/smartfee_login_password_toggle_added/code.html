<!DOCTYPE html>

<html class="dark" lang="en" style="--theme-color: #8B5CF6;"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EDU-Fee Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        function openLogin(role) {
            const panel = document.getElementById('login-panel');
            const selection = document.getElementById('selection-view');
            const header = document.getElementById('brand-header');
            const badge = document.getElementById('role-badge');
            const accent = document.getElementById('accent-bar');
            const idLabel = document.getElementById('id-label');
            const loginBtn = document.getElementById('login-button');
            const signupLink = document.getElementById('student-signup-link');
            
            // Set Dynamic Styles based on role
            const themeColor = role === 'student' ? '#2563EB' : '#8B5CF6';
            
            badge.innerText = role.charAt(0).toUpperCase() + role.slice(1);
            badge.style.color = themeColor;
            badge.style.borderColor = themeColor + '33';
            badge.style.backgroundColor = themeColor + '22';
            accent.style.backgroundColor = themeColor;
            loginBtn.style.backgroundColor = themeColor;
            idLabel.innerText = role === 'student' ? 'Student ID / Registration No' : 'Admin ID / Email';
            
            // Show/Hide signup link based on role
            if (role === 'student') {
                signupLink.classList.remove('hidden');
            } else {
                signupLink.classList.add('hidden');
            }
            
            // Custom CSS Variable for dynamic colors in utility classes
            document.documentElement.style.setProperty('--theme-color', themeColor);
            
            // Update the --theme custom utility
            const style = document.createElement('style');
            style.innerHTML = `.text-theme { color: ${themeColor} !important; } .bg-theme { background-color: ${themeColor} !important; } .focus\\:border-theme:focus { border-color: ${themeColor} !important; } .focus\\:ring-theme\\/30:focus { --tw-ring-color: ${themeColor}4D !important; }`;
            document.head.appendChild(style);

            selection.classList.remove('active-state');
            selection.classList.add('hidden-state');
            header.classList.add('opacity-50', 'scale-95', 'transition-all', 'duration-500');
            
            setTimeout(() => {
                panel.classList.remove('hidden-state');
                panel.classList.add('active-state');
            }, 100);
        }

        function closeLogin() {
            const panel = document.getElementById('login-panel');
            const selection = document.getElementById('selection-view');
            const header = document.getElementById('brand-header');
            
            panel.classList.remove('active-state');
            panel.classList.add('hidden-state');
            
            setTimeout(() => {
                selection.classList.remove('hidden-state');
                selection.classList.add('active-state');
                header.classList.remove('opacity-50', 'scale-95');
            }, 300);
        }
    </script>
<style>
        body {
            min-height: 100dvh;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .login-panel {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }
        .login-panel.hidden-state {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }
        .login-panel.active-state {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .selection-view {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }
        .selection-view.hidden-state {
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
        }
        .selection-view.active-state {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-100vh) translateX(20px); }
        }
    </style>

<script>
        function openLogin(role) {
            const panel = document.getElementById('login-panel');
            const selection = document.getElementById('selection-view');
            const header = document.getElementById('brand-header');
            const badge = document.getElementById('role-badge');
            const accent = document.getElementById('accent-bar');
            const idLabel = document.getElementById('id-label');
            const loginBtn = document.getElementById('login-button');
            const signupLink = document.getElementById('student-signup-link');
            
            // Set Dynamic Styles based on role
            const themeColor = role === 'student' ? '#2563EB' : '#8B5CF6';
            
            badge.innerText = role.charAt(0).toUpperCase() + role.slice(1);
            badge.style.color = themeColor;
            badge.style.borderColor = themeColor + '33';
            badge.style.backgroundColor = themeColor + '22';
            accent.style.backgroundColor = themeColor;
            loginBtn.style.backgroundColor = themeColor;
            idLabel.innerText = role === 'student' ? 'Student ID / Registration No' : 'Admin ID / Email';
            
            // Show/Hide signup link based on role
            if (role === 'student') {
                signupLink.classList.remove('hidden');
            } else {
                signupLink.classList.add('hidden');
            }
            
            // Custom CSS Variable for dynamic colors in utility classes
            document.documentElement.style.setProperty('--theme-color', themeColor);
            
            // Update the --theme custom utility
            const style = document.createElement('style');
            style.innerHTML = `.text-theme { color: ${themeColor} !important; } .bg-theme { background-color: ${themeColor} !important; } .focus\\:border-theme:focus { border-color: ${themeColor} !important; } .focus\\:ring-theme\\/30:focus { --tw-ring-color: ${themeColor}4D !important; }`;
            document.head.appendChild(style);

            selection.classList.remove('active-state');
            selection.classList.add('hidden-state');
            header.classList.add('opacity-50', 'scale-95', 'transition-all', 'duration-500');
            
            setTimeout(() => {
                panel.classList.remove('hidden-state');
                panel.classList.add('active-state');
            }, 100);
        }

        function closeLogin() {
            const panel = document.getElementById('login-panel');
            const selection = document.getElementById('selection-view');
            const header = document.getElementById('brand-header');
            
            panel.classList.remove('active-state');
            panel.classList.add('hidden-state');
            
            setTimeout(() => {
                selection.classList.remove('hidden-state');
                selection.classList.add('active-state');
                header.classList.remove('opacity-50', 'scale-95');
            }, 300);
        }
    </script>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password-input');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }
    </script></body></html>
